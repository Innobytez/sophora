services:
  postgres:
    image: postgres:16-alpine
    container_name: sophora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sophora
      POSTGRES_USER: sophora
      POSTGRES_PASSWORD: sophora
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sophora -d sophora"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: sophora-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sophora
      MINIO_ROOT_PASSWORD: sophora-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
