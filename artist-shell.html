<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Artist | Sophora</title>
  <link rel="icon" type="image/png" href="/assets/sophora_logo_square.png" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/backend.css" />
</head>
<body class="artist-page-shell">
  <div class="container">
    <header class="page-header artist-header">
      <div class="page-header-title" id="artist-header-title"></div>
    </header>

    <main id="artist-page-content">
      <section class="artist-hero-panel">
        <div id="artist-hero-slot" class="artist-hero-media"></div>
      </section>
      <section id="artist-sections" class="artist-section-grid"></section>
    </main>

    <footer class="site-footer">
      <div class="footer-cta">
        <div class="footer-cta-buttons">
          <a id="artist-book-link" class="btn outline book-logo-btn" href="#">
            <img src="/assets/sophora_logo.png" alt="" aria-hidden="true" />
            <span data-i18n="book_now">Book Now</span>
          </a>
          <a class="btn outline book-logo-btn" href="/artists.html">
            <img src="/assets/sophora_logo.png" alt="" aria-hidden="true" />
            <span data-i18n="other_artists">Artist List</span>
          </a>
        </div>
        <div class="content-divider" aria-hidden="true"></div>
      </div>
      <div class="footer-grid footer-grid--two">
        <div class="footer-item footer-copyright">
          <span class="footer-label">© 2026</span>
          <a class="footer-value" href="/index.html">sophora.cl</a>
        </div>
        <div class="footer-item footer-language">
          <span class="footer-label">Language</span>
          <select id="lang-select" aria-label="Language"></select>
        </div>
      </div>
      <div class="footer-access">
        <a class="btn outline footer-access-btn" href="/auth.html" data-i18n="artist_access">Artist Access</a>
      </div>
    </footer>
  </div>

  <script src="/i18n.js" defer></script>
  <script src="/site.js" defer></script>
  <script src="/backend-common.js" defer></script>
  <script src="/artist-page.js" defer></script>
</body>
</html>
