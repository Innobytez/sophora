<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify Email | Sophora</title>
  <link rel="icon" type="image/png" href="assets/sophora_logo_square.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="backend.css" />
</head>
<body class="backend-shell">
  <div class="container">
    <header class="site-header">
      <div class="brand center">
        <img src="assets/sophora_logo.png" alt="Sophora logo" />
        <div class="agency-title" data-i18n="agency_title">Agencia de musica</div>
      </div>
    </header>
    <div class="section-divider" aria-hidden="true"></div>

    <main>
      <section class="backend-hero">
        <span class="backend-kicker">Sophora</span>
        <h1 class="backend-title" data-t="verify_title">Verificar correo</h1>
        <p class="backend-subtitle" data-t="verify_subtitle">Estamos activando tu cuenta de artista.</p>
      </section>

      <section class="backend-card">
        <p id="verify-status" class="backend-status active" data-t="loading">Cargando...</p>
        <div class="backend-inline-actions">
          <a class="btn outline hidden" id="verify-auth-link" href="auth.html" data-t="login_tab">Ingresar</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-grid footer-grid--two">
        <div class="footer-item footer-copyright">
          <span class="footer-label">© 2026</span>
          <a class="footer-value" href="index.html">sophora.cl</a>
        </div>
        <div class="footer-item footer-language">
          <span class="footer-label">Language</span>
          <select id="lang-select" aria-label="Language"></select>
        </div>
      </div>
    </footer>
  </div>

  <script src="i18n.js" defer></script>
  <script src="site.js" defer></script>
  <script src="backend-common.js" defer></script>
  <script src="auth.js" defer></script>
</body>
</html>
