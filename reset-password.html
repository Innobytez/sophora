<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password | Sophora</title>
  <link rel="icon" type="image/png" href="assets/sophora_logo_square.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="backend.css" />
</head>
<body class="backend-shell">
  <div class="container">
    <header class="site-header">
      <div class="brand center">
        <img src="assets/sophora_logo.png" alt="Sophora logo" />
        <div class="agency-title" data-i18n="agency_title">Agencia de musica</div>
      </div>
    </header>
    <div class="section-divider" aria-hidden="true"></div>

    <main>
      <section class="backend-hero">
        <span class="backend-kicker">Sophora</span>
        <h1 class="backend-title" data-t="reset_title">Restablecer password</h1>
        <p class="backend-subtitle" data-t="reset_subtitle">Confirma tu nueva password dos veces para actualizar el acceso del artista.</p>
      </section>

      <section class="backend-card">
        <p id="reset-status" class="backend-status active" data-t="loading">Cargando...</p>
        <form id="reset-form" class="backend-form-grid hidden">
          <div class="backend-field">
            <label>Correo</label>
            <input id="reset-email" type="email" readonly />
          </div>
          <div class="backend-field">
            <label>Usuario</label>
            <input id="reset-username" type="text" readonly />
          </div>
          <div class="backend-field">
            <label for="reset-password" data-t="signup_password">Crear password</label>
            <input id="reset-password" name="password" type="password" required />
          </div>
          <div class="backend-field">
            <label for="reset-password-confirm" data-t="signup_password_confirm">Confirmar password</label>
            <input id="reset-password-confirm" name="passwordConfirm" type="password" required />
          </div>
          <div class="backend-inline-actions full">
            <button class="btn outline" type="submit" data-t="update">Guardar</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-grid footer-grid--two">
        <div class="footer-item footer-copyright">
          <span class="footer-label">© 2026</span>
          <a class="footer-value" href="index.html">sophora.cl</a>
        </div>
        <div class="footer-item footer-language">
          <span class="footer-label">Language</span>
          <select id="lang-select" aria-label="Language"></select>
        </div>
      </div>
    </footer>
  </div>

  <script src="i18n.js" defer></script>
  <script src="site.js" defer></script>
  <script src="backend-common.js" defer></script>
  <script src="auth.js" defer></script>
</body>
</html>
